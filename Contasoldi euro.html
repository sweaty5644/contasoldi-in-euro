<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Calcolatore di denaro in euro con banconote e monete, resoconto dettagliato e stampa ottimizzata">
<meta name="theme-color" content="#1e3c72">
<meta name="author" content="Il tuo nome">

<!-- Open Graph per anteprime social (Facebook, WhatsApp, ecc.) -->
<meta property="og:title" content="💶 Contasoldi Euro">
<meta property="og:description" content="Calcola e stampa il resoconto del tuo denaro in euro">
<meta property="og:type" content="website">

<!-- Favicon con emoji euro (nessun file esterno necessario) -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💶</text></svg>">

<title>💶 Contasoldi Euro - Calcolatore Denaro</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  h1 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .section-title {
    color: white;
    margin: 20px 0 10px;
    font-size: 1.3em;
    border-left: 4px solid gold;
    padding-left: 10px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
  }
  .money-card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
    transition: transform 0.2s;
  }
  .money-card:hover { transform: translateY(-3px); }
  .icon {
    width: 100%;
    height: 70px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 1.4em;
    margin-bottom: 10px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }
  .icon::before {
    content: '€';
    position: absolute;
    right: 5px;
    bottom: -5px;
    font-size: 3em;
    opacity: 0.15;
  }
  .icon.coin {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    margin: 0 auto 10px;
    font-size: 1.1em;
    border: 3px double rgba(255,255,255,0.6);
  }
  .n500 { background: linear-gradient(135deg, #8b4789, #a64ca6); }
  .n200 { background: linear-gradient(135deg, #2d5016, #4a7c2e); }
  .n100 { background: linear-gradient(135deg, #3a7033, #5a9e4a); }
  .n50  { background: linear-gradient(135deg, #d97b29, #f39c12); }
  .n20  { background: linear-gradient(135deg, #1e5f8a, #2980b9); }
  .n10  { background: linear-gradient(135deg, #a93226, #c0392b); }
  .n5   { background: linear-gradient(135deg, #7d3c98, #9b59b6); }
  .c2   { background: radial-gradient(circle at 30% 30%, #e0e0e0, #9e9e9e); color: #333; text-shadow: none; }
  .c1   { background: radial-gradient(circle at 30% 30%, #f4d03f, #b7950b); color: #333; text-shadow: none; }
  .c50  { background: radial-gradient(circle at 30% 30%, #d4a574, #8b5a2b); }
  .c20  { background: radial-gradient(circle at 30% 30%, #e8b883, #a0692d); }
  .c10  { background: radial-gradient(circle at 30% 30%, #c9a27a, #7a4a1f); }
  .c5   { background: radial-gradient(circle at 30% 30%, #b87333, #7a4420); }
  .c2c  { background: radial-gradient(circle at 30% 30%, #cd7f32, #8b4513); }
  .c1c  { background: radial-gradient(circle at 30% 30%, #b87333, #6b3410); }
  
  input[type="number"] {
    width: 100%;
    padding: 8px;
    border: 2px solid #ddd;
    border-radius: 6px;
    font-size: 1em;
    text-align: center;
  }
  input[type="number"]:focus {
    outline: none;
    border-color: #2a5298;
  }
  .value { font-size: 0.85em; color: #666; margin-top: 5px; }
  .subtotal {
    font-weight: bold;
    color: #2a5298;
    margin-top: 5px;
    font-size: 0.95em;
  }
  .total-box {
    background: white;
    border-radius: 12px;
    padding: 25px;
    margin-top: 25px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .total-label { font-size: 1.2em; color: #666; }
  .total-amount {
    font-size: 3em;
    font-weight: bold;
    color: #1e3c72;
    margin: 10px 0;
  }
  .buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
    flex-wrap: wrap;
  }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 1em;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }
  .btn-primary { background: #2a5298; color: white; }
  .btn-danger { background: #c0392b; color: white; }
  .btn-success { background: #27ae60; color: white; }
  button:hover { transform: scale(1.05); }
  
  .report {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-top: 20px;
    display: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .report.active { display: block; }
  .report h2 {
    color: #1e3c72;
    border-bottom: 2px solid #2a5298;
    padding-bottom: 10px;
    margin-bottom: 15px;
  }
  .report table { width: 100%; border-collapse: collapse; }
  .report th, .report td {
    padding: 8px;
    text-align: left;
    border-bottom: 1px solid #eee;
  }
  .report th { background: #f5f5f5; }
  .report tr.total-row {
    font-weight: bold;
    background: #e8f0ff;
    font-size: 1.1em;
  }
  .timestamp {
    color: #888;
    font-size: 0.9em;
    margin-bottom: 10px;
  }
  
  footer {
    text-align: center;
    color: rgba(255,255,255,0.7);
    margin-top: 30px;
    padding: 20px;
    font-size: 0.9em;
  }
  footer a { color: gold; text-decoration: none; }
  
  @media print {
    @page { size: A4; margin: 15mm; }
    body { background: white !important; padding: 0 !important; color: #000 !important; }
    body * { visibility: hidden !important; }
    .report, .report * { visibility: visible !important; }
    .report {
      position: absolute !important;
      left: 0 !important;
      top: 0 !important;
      width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      background: white !important;
    }
    .report table { font-size: 12pt; }
    .report th { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .report tr.total-row { background: #e8f0ff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .report h2 { font-size: 22pt; border-bottom: 2px solid #1e3c72 !important; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>💶 Contasoldi Euro 💶</h1>
  
  <h2 class="section-title">Banconote</h2>
  <div class="grid" id="banknotes"></div>
  
  <h2 class="section-title">Monete</h2>
  <div class="grid" id="coins"></div>
  
  <div class="total-box">
    <div class="total-label">Totale complessivo</div>
    <div class="total-amount" id="total">€ 0,00</div>
    <div class="buttons">
      <button class="btn-success" onclick="generateReport()">📄 Genera Resoconto</button>
      <button class="btn-primary" onclick="printReport()">🖨️ Stampa Resoconto</button>
      <button class="btn-danger" onclick="resetAll()">🗑️ Azzera</button>
    </div>
  </div>
  
  <div class="report" id="report"></div>
  
  <footer>
    <p>💶 Contasoldi Euro - Calcolatore denaro gratuito</p>
  </footer>
</div>

<script>
  const banknotes = [
    {value: 500, class: 'n500'}, {value: 200, class: 'n200'},
    {value: 100, class: 'n100'}, {value: 50, class: 'n50'},
    {value: 20, class: 'n20'}, {value: 10, class: 'n10'}, {value: 5, class: 'n5'}
  ];
  const coins = [
    {value: 2, class: 'c2', label: '2€'},
    {value: 1, class: 'c1', label: '1€'},
    {value: 0.50, class: 'c50', label: '50c'},
    {value: 0.20, class: 'c20', label: '20c'},
    {value: 0.10, class: 'c10', label: '10c'},
    {value: 0.05, class: 'c5', label: '5c'},
    {value: 0.02, class: 'c2c', label: '2c'},
    {value: 0.01, class: 'c1c', label: '1c'}
  ];
  
  function createCard(item, type) {
    const isCoin = type === 'coin';
    const label = isCoin ? item.label : `€ ${item.value}`;
    return `
      <div class="money-card">
        <div class="icon ${isCoin ? 'coin ' : ''}${item.class}">${label}</div>
        <input type="number" min="0" value="0" data-value="${item.value}" data-label="${label}" onchange="update()" oninput="update()">
        <div class="value">× ${label}</div>
        <div class="subtotal" data-subtotal>€ 0,00</div>
      </div>
    `;
  }
  
  document.getElementById('banknotes').innerHTML = banknotes.map(b => createCard(b, 'note')).join('');
  document.getElementById('coins').innerHTML = coins.map(c => createCard(c, 'coin')).join('');
  
  function update() {
    let total = 0;
    document.querySelectorAll('input[type="number"]').forEach(input => {
      const qty = parseInt(input.value) || 0;
      const value = parseFloat(input.dataset.value);
      const sub = qty * value;
      total += sub;
      input.parentElement.querySelector('[data-subtotal]').textContent = 
        '€ ' + sub.toFixed(2).replace('.', ',');
    });
    document.getElementById('total').textContent = 
      '€ ' + total.toFixed(2).replace('.', ',');
  }
  
  function buildReportHTML() {
    const rows = [];
    let total = 0, totalPieces = 0;
    document.querySelectorAll('input[type="number"]').forEach(input => {
      const qty = parseInt(input.value) || 0;
      if (qty > 0) {
        const value = parseFloat(input.dataset.value);
        const label = input.dataset.label;
        const sub = qty * value;
        total += sub;
        totalPieces += qty;
        rows.push(`<tr><td>${label}</td><td style="text-align:center">${qty}</td><td style="text-align:right">€ ${sub.toFixed(2).replace('.',',')}</td></tr>`);
      }
    });
    const now = new Date().toLocaleString('it-IT');
    return `
      <h2>📋 Resoconto Denaro</h2>
      <div class="timestamp">Generato il: ${now}</div>
      <table>
        <thead><tr><th>Taglio</th><th style="text-align:center">Quantità</th><th style="text-align:right">Importo</th></tr></thead>
        <tbody>
          ${rows.length ? rows.join('') : '<tr><td colspan="3" style="text-align:center;color:#999">Nessun importo inserito</td></tr>'}
          <tr class="total-row"><td>TOTALE</td><td style="text-align:center">${totalPieces} pezzi</td><td style="text-align:right">€ ${total.toFixed(2).replace('.',',')}</td></tr>
        </tbody>
      </table>
    `;
  }
  
  function generateReport() {
    const report = document.getElementById('report');
    report.innerHTML = buildReportHTML();
    report.classList.add('active');
    report.scrollIntoView({behavior: 'smooth'});
  }
  
  function printReport() {
    const report = document.getElementById('report');
    if (!report.classList.contains('active')) {
      generateReport();
    } else {
      report.innerHTML = buildReportHTML();
    }
    setTimeout(() => window.print(), 100);
  }
  
  function resetAll() {
    if (confirm('Sei sicuro di voler azzerare tutto?')) {
      document.querySelectorAll('input[type="number"]').forEach(i => i.value = 0);
      document.getElementById('report').classList.remove('active');
      update();
    }
  }
</script>
</body>
</html>
