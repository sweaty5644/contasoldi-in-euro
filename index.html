<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💶 Contasoldi Euro - Calcolatore Denaro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e3a5f;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .user-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 0 auto 30px;
            text-align: center;
        }

        .user-section h3 {
            margin-bottom: 15px;
            color: #1e3a5f;
        }

        .user-section input {
            padding: 10px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 10px;
        }

        .user-section button {
            padding: 10px 20px;
            font-size: 1em;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .user-section button:hover {
            background: #2980b9;
        }

        .user-info {
            color: white;
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            max-width: 400px;
            margin: 0 auto 20px;
        }

        .user-info button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            color: white;
            font-size: 1.5em;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 4px solid #f1c403;
        }

        .money-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .money-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .money-image {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4em;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .banknote-500 { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .banknote-200 { background: linear-gradient(135deg, #f1c40f, #d4ac0d); }
        .banknote-100 { background: linear-gradient(135deg, #27ae60, #1e8449); }
        .banknote-50 { background: linear-gradient(135deg, #e67e22, #d35400); }
        .banknote-20 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .banknote-10 { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .banknote-5 { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }

        .coin-2, .coin-1 { 
            background: linear-gradient(135deg, #bdc3c7, #95a5a6);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .coin-50, .coin-20, .coin-10 { 
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .coin-5, .coin-2c, .coin-1c { 
            background: linear-gradient(135deg, #cd7f32, #a0522d);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .money-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #1e3a5f;
            margin-bottom: 10px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .control-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 5px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .control-btn.minus {
            background: #e74c3c;
            color: white;
        }

        .control-btn.plus {
            background: #27ae60;
            color: white;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn.holding {
            animation: pulse 0.3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .quantity {
            font-size: 1.3em;
            font-weight: bold;
            color: #1e3a5f;
            min-width: 40px;
            text-align: center;
        }

        .subtotal {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 5px;
        }

        .total-amount {
            font-size: 1.1em;
            font-weight: bold;
            color: #1e3a5f;
        }

        .total-section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            margin-top: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .total-label {
            font-size: 1.5em;
            color: #1e3a5f;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .total-value {
            font-size: 2.5em;
            color: #1e3a5f;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-info { background: #9b59b6; color: white; }
        .btn-warning { background: #f39c12; color: white; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #1e3a5f;
        }

        .close-modal {
            font-size: 1.8em;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #e74c3c;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .summary-item:last-child {
            border-bottom: none;
            font-weight: bold;
            font-size: 1.2em;
            color: #27ae60;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid #27ae60;
        }

        .history-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }

        .history-date {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .history-total {
            font-size: 1.3em;
            font-weight: bold;
            color: #27ae60;
        }

        .save-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            animation: slideIn 0.3s ease-out;
            z-index: 2000;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }

        @media print {
            body { background: white; }
            .buttons, .control-btn, .user-section { display: none !important; }
            .money-card { break-inside: avoid; }
        }

        @media (max-width: 768px) {
            .money-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💶 Contasoldi Euro </h1>
    </div>

    <div class="user-section" id="loginSection">
        <h3>🔐 Accedi per salvare i tuoi resoconti</h3>
        <input type="text" id="userCode" placeholder="Inserisci il tuo codice utente">
        <div>
            <button onclick="login()">Accedi</button>
            <button onclick="register()" style="background: #27ae60;">Registrati</button>
        </div>
    </div>

    <div class="user-info" id="userInfo" style="display: none;">
        👤 Utente: <strong id="currentUserName"></strong>
        <div id="lastAccessTime" style="font-size: 0.8em; margin-top: 5px; color: #ddd;"></div>
        <button onclick="logout()" style="margin-top: 8px;">Esci</button>
    </div>

    <div class="section">
        <h2 class="section-title">Banconote</h2>
        <div class="money-grid" id="banknotes-grid"></div>
    </div>

    <div class="section">
        <h2 class="section-title">Monete</h2>
        <div class="money-grid" id="coins-grid"></div>
    </div>

    <div class="total-section">
        <div class="total-label">Totale complessivo</div>
        <div class="total-value" id="total-amount">€ 0,00</div>
        <div class="buttons">
            <button class="btn btn-primary" onclick="generateReport()">📄 Genera Resoconto</button>
            <button class="btn btn-success" onclick="saveAndPrint()">🖨️ Salva e Stampa</button>
            <button class="btn btn-warning" onclick="showHistory()">📋 Cronologia</button>
            <button class="btn btn-danger" onclick="resetAll()">🗑️ Azzera</button>
        </div>
    </div>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 Resoconto</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div id="report-content"></div>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>📋 La tua Cronologia</h2>
                <span class="close-modal" onclick="closeHistory()">&times;</span>
            </div>
            <div id="history-content"></div>
        </div>
    </div>

    <div id="saveIndicator" class="save-indicator">
        ✅ Resoconto salvato!
    </div>

    <!-- Firebase SDK (v9 Compatibile con Realtime Database) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ========== INSERISCI QUI LA TUA CONFIGURAZIONE FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDe-4CJQUAtFNACpSZu0mN6iHJjPtbCj0",
            authDomain: "contasoldi-d774a.firebaseapp.com",
            databaseURL: "https://contasoldi-d774a-default-rtdb.europe-west1.firebasedatabase.app/", // URL del Realtime Database
            projectId: "contasoldi-d774a",
            storageBucket: "contasoldi-d774a.firebasestorage.app",
            messagingSenderId: "916515348477",
            appId: "1:916515348477:web:e10c3ec3db55318a4f94"
        };
        // ===================================================================

        // Inizializza Firebase con il Realtime Database
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variabili globali
        let currentUser = null;
        let quantities = {};
        let holdInterval = null;
        let holdTimeout = null;
        let currentBtn = null;

        const banknotes = [
            { value: 500, class: 'banknote-500' },
            { value: 200, class: 'banknote-200' },
            { value: 100, class: 'banknote-100' },
            { value: 50, class: 'banknote-50' },
            { value: 20, class: 'banknote-20' },
            { value: 10, class: 'banknote-10' },
            { value: 5, class: 'banknote-5' }
        ];

        const coins = [
            { value: 2, class: 'coin-2' },
            { value: 1, class: 'coin-1' },
            { value: 0.50, class: 'coin-50' },
            { value: 0.20, class: 'coin-20' },
            { value: 0.10, class: 'coin-10' },
            { value: 0.05, class: 'coin-5' },
            { value: 0.02, class: 'coin-2c' },
            { value: 0.01, class: 'coin-1c' }
        ];

        function init() {
            banknotes.forEach(note => quantities[note.value] = 0);
            coins.forEach(coin => quantities[coin.value] = 0);
            renderBanknotes();
            renderCoins();
            updateTotal();
            
            // Controlla se c'è un utente salvato
            const savedUser = localStorage.getItem('contasoldi_user');
            if (savedUser) {
                currentUser = savedUser;
                showUserInfo();
            }
        }

        // Registrazione su Realtime Database
        function register() {
            const code = document.getElementById('userCode').value.trim();
            if (!code) {
                alert('Inserisci un codice utente!');
                return;
            }

            db.ref('users/' + code).once('value').then(snapshot => {
                if (snapshot.exists()) {
                    alert('Questo codice utente esiste già! Accedi invece.');
                } else {
                    const now = new Date();
                    db.ref('users/' + code).set({
                        createdAt: now.toISOString(),
                        lastLogin: now.toISOString(),
                        code: code
                    }).then(() => {
                        currentUser = code;
                        localStorage.setItem('contasoldi_user', code);
                        showUserInfo(now.toISOString());
                        alert('Registrazione avvenuta con successo!');
                    }).catch(err => {
                        console.error(err);
                        alert("Errore durante la registrazione. Controlla le regole su Firebase.");
                    });
                }
            });
        }

        // Login con salvataggio automatico dell'orario di accesso
        function login() {
            const code = document.getElementById('userCode').value.trim();
            if (!code) {
                alert('Inserisci un codice utente!');
                return;
            }

            db.ref('users/' + code).once('value').then(snapshot => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const lastAccess = data.lastLogin || new Date().toISOString();
                    const now = new Date();
                    
                    // Aggiorna l'orario di ultimo accesso sul database
                    db.ref('users/' + code).update({
                        lastLogin: now.toISOString()
                    }).then(() => {
                        currentUser = code;
                        localStorage.setItem('contasoldi_user', code);
                        showUserInfo(lastAccess);
                    });
                } else {
                    alert('Codice utente non trovato. Registrati prima!');
                }
            }).catch(err => {
                console.error(err);
                alert("Errore di connessione al Database. Hai impostato correttamente le regole?");
            });
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('contasoldi_user');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            resetAll(true); // Azzera silenziosamente i campi all'uscita
        }

        function showUserInfo(lastAccessIsoString) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('currentUserName').textContent = currentUser;
            
            if(lastAccessIsoString) {
                const date = new Date(lastAccessIsoString);
                const formattedDate = date.toLocaleDateString('it-IT') + " alle " + date.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
                document.getElementById('lastAccessTime').innerHTML = `Ultimo accesso: <br><strong>${formattedDate}</strong>`;
            } else {
                document.getElementById('lastAccessTime').innerHTML = "";
            }
        }

        function renderBanknotes() {
            const grid = document.getElementById('banknotes-grid');
            grid.innerHTML = banknotes.map(note => createCard(note.value, note.class, 'banknote')).join('');
        }

        function renderCoins() {
            const grid = document.getElementById('coins-grid');
            grid.innerHTML = coins.map(coin => createCard(coin.value, coin.class, 'coin')).join('');
        }

        function createCard(value, cssClass, type) {
            const displayValue = value >= 1 ? `€ ${value.toFixed(0)}` : `${(value * 100).toFixed(0)}c`;
            return `
                <div class="money-card">
                    <div class="money-image ${cssClass}">${displayValue}</div>
                    <div class="money-value">${displayValue}</div>
                    <div class="quantity-controls">
                        <button class="control-btn minus" 
                                onmousedown="startHold(${value}, 'minus', this)" 
                                onmouseup="endHold()" 
                                onmouseleave="endHold()"
                                ontouchstart="startHold(${value}, 'minus', this)" 
                                ontouchend="endHold()">−</button>
                        <div class="quantity" id="qty-${value}">0</div>
                        <button class="control-btn plus" 
                                onmousedown="startHold(${value}, 'plus', this)" 
                                onmouseup="endHold()" 
                                onmouseleave="endHold()"
                                ontouchstart="startHold(${value}, 'plus', this)" 
                                ontouchend="endHold()">+</button>
                    </div>
                    <div class="subtotal">× ${displayValue}</div>
                    <div class="total-amount" id="total-${value}">€ 0,00</div>
                </div>
            `;
        }

        function startHold(value, operation, btn) {
            currentBtn = btn;
            btn.classList.add('holding');
            updateQuantity(value, operation);
            
            holdTimeout = setTimeout(() => {
                holdInterval = setInterval(() => {
                    updateQuantity(value, operation);
                }, 100);
            }, 500);
        }

        function endHold() {
            if (currentBtn) {
                currentBtn.classList.remove('holding');
            }
            clearTimeout(holdTimeout);
            clearInterval(holdInterval);
            currentBtn = null;
        }

        function updateQuantity(value, operation) {
            if (operation === 'plus') {
                quantities[value]++;
            } else if (operation === 'minus' && quantities[value] > 0) {
                quantities[value]--;
            }
            updateDisplay(value);
            updateTotal();
        }

        function updateDisplay(value) {
            document.getElementById(`qty-${value}`).textContent = quantities[value];
            const subtotal = quantities[value] * value;
            document.getElementById(`total-${value}`).textContent = '€ ' + subtotal.toFixed(2).replace('.', ',');
        }

        function updateTotal() {
            let total = 0;
            for (let value in quantities) {
                total += quantities[value] * parseFloat(value);
            }
            document.getElementById('total-amount').textContent = '€ ' + total.toFixed(2).replace('.', ',');
        }

        function resetAll(silent = false) {
            if (silent || confirm('Sei sicuro di voler azzerare tutto?')) {
                for (let value in quantities) {
                    quantities[value] = 0;
                    updateDisplay(value);
                }
                updateTotal();
            }
        }

        function generateReport() {
            let report = '<div class="summary-list">';
            let total = 0;
            let hasItems = false;
            
            banknotes.forEach(note => {
                if (quantities[note.value] > 0) {
                    hasItems = true;
                    const subtotal = quantities[note.value] * note.value;
                    total += subtotal;
                    report += `<div class="summary-item"><span>€ ${note.value} × ${quantities[note.value]}</span><span>€ ${subtotal.toFixed(2).replace('.', ',')}</span></div>`;
                }
            });
            
            coins.forEach(coin => {
                if (quantities[coin.value] > 0) {
                    hasItems = true;
                    const subtotal = quantities[coin.value] * coin.value;
                    total += subtotal;
                    report += `<div class="summary-item"><span>${coin.value >= 1 ? '€ ' + coin.value : (coin.value * 100).toFixed(0) + 'c'} × ${quantities[coin.value]}</span><span>€ ${subtotal.toFixed(2).replace('.', ',')}</span></div>`;
                }
            });
            
            if (!hasItems) {
                report += '<p style="text-align:center;color:#999;padding:20px;">Nessuna banconota o moneta inserita</p>';
            }
            
            report += `<div class="summary-item"><span>TOTALE</span><span>€ ${total.toFixed(2).replace('.', ',')}</span></div></div>`;
            
            document.getElementById('report-content').innerHTML = report;
            document.getElementById('reportModal').style.display = 'flex';
        }

        function saveToDatabase(total) {
            if (!currentUser) {
                alert('Devi accedere per salvare i resoconti!');
                return Promise.resolve(false);
            }

            const reportData = {
                userCode: currentUser,
                total: total,
                quantities: {...quantities},
                date: new Date().toISOString()
            };

            // Salvataggio con ID univoco incrementale generato da Firebase (push)
            const newReportRef = db.ref('reports').push();
            return newReportRef.set(reportData).then(() => {
                showSaveIndicator();
                return true;
            }).catch(error => {
                console.error('Errore salvataggio:', error);
                alert('Errore nel salvataggio del resoconto');
                return false;
            });
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 3000);
        }

        function saveAndPrint() {
            if (!currentUser) {
                alert('Devi accedere per salvare i resoconti!');
                return;
            }

            const total = parseFloat(document.getElementById('total-amount').textContent.replace('€ ', '').replace(',', '.'));
            
            saveToDatabase(total).then((success) => {
                if(success) {
                    setTimeout(() => {
                        window.print();
                    }, 500);
                }
            });
        }

        // Caricamento cronologia corretta dal Realtime Database
        function showHistory() {
            if (!currentUser) {
                alert('Devi accedere per vedere la cronologia!');
                return;
            }

            document.getElementById('history-content').innerHTML = '<p style="text-align:center;padding:20px;">Caricamento...</p>';
            document.getElementById('historyModal').style.display = 'flex';

            db.ref('reports')
                .orderByChild('userCode')
                .equalTo(currentUser)
                .once('value')
                .then(snapshot => {
                    if (!snapshot.exists()) {
                        document.getElementById('history-content').innerHTML = 
                            '<p style="text-align:center;color:#999;padding:20px;">Nessun resoconto salvato</p>';
                        return;
                    }

                    let reports = [];
                    snapshot.forEach(childSnapshot => {
                        reports.push(childSnapshot.val());
                    });
                    
                    // Ordiniamo dal più recente al più vecchio
                    reports.sort((a, b) => new Date(b.date) - new Date(a.date));

                    let html = '';
                    reports.forEach(data => {
                        const date = new Date(data.date);
                        const dateStr = date.toLocaleDateString('it-IT');
                        const timeStr = date.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
                        
                        html += `
                            <div class="history-item">
                                <div class="history-date">📅 ${dateStr} alle ${timeStr}</div>
                                <div class="history-total">💰 € ${data.total.toFixed(2).replace('.', ',')}</div>
                            </div>
                        `;
                    });

                    document.getElementById('history-content').innerHTML = html;
                })
                .catch(error => {
                    console.error('Errore caricamento cronologia:', error);
                    document.getElementById('history-content').innerHTML = 
                        '<p style="text-align:center;color:#e74c3c;padding:20px;">Errore nel caricamento della cronologia</p>';
                });
        }

        function closeModal() {
            document.getElementById('reportModal').style.display = 'none';
        }

        function closeHistory() {
            document.getElementById('historyModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modals = ['reportModal', 'historyModal'];
            modals.forEach(modalId => {
                const modal = document.getElementById(modalId);
                if (event.target === modal) {
                    if (modalId === 'reportModal') closeModal();
                    else closeHistory();
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
